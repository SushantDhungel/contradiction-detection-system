services:
  db:
    image: postgres:18-trixie
    restart: always
    shm_size: 512mb
    ports:
      - 5433:5432
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST:-localhost}
      POSTGRES_PORT: ${POSTGRES_PORT}

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - metrics:/var/lib/postgresql/data
    networks:
      - contradiction-system-network
  s3:
    image: minio/minio:latest
    restart: always
    env_file:
      - ./.env
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - s3_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - contradiction-system-network
  s3-setup:
    image: minio/mc
    depends_on:
      s3:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - contradiction-system-network
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://s3:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; /usr/bin/mc mb --ignore-existing myminio/contradiction-documents; /usr/bin/mc anonymous set download myminio/contradiction-documents; exit 0; "

volumes:
  metrics:
    driver: local
  s3_data:
    driver: local

networks:
  contradiction-system-network:
    driver: bridge
